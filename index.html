<html>
<head>
    <title> Animacion CSS3</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;

        }
        
        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid black;
            position: relative;
            margin: 0 auto;
            overflow: hidden; 
            background-image: url(img/campo.jpg);
            background-size: cover ;
        }

        .cuadrito{
            width: 50px;
            height: 50px;
            position: absolute;
            left: -100px;
            top: 50px;
            animation: cuadrito 1s infinite;
            
        }
        .cuadrito2{
            width: 50px;
            height: 50px;
            position: absolute;
            top: 50px;
            left: 400px;
            animation: cuadrito2 1s infinite;
        }

        
        @keyframes cuadrito2{
            0%{
                left: 400px;
                top: 50px;
                rotate: 0deg;
            }
            50%{
                left: 175px;
                top: 0px;
                rotate: -60deg;
            }
            100%{
                left: -100px;
                top: 50px;
                rotate: 0deg;
            }
        }
        @keyframes cuadrito {
            0%{
                left: -100px;
                top: 50px;
                rotate: 0deg;
            }
            50%{
                left: 175px;
                top: 0px;
                rotate: 60deg;
            }
            100%{
                left: 400px;
                top: 50px;
                rotate: -0deg;
            }
        }
      .cuadrito img{
        width: 50px;
        height: 50px;
      }
      .cuadrito2 img{
         width: 50px;
        height: 50px;
      }

    </style>
</head>
<body>
    
    <div class="contenedor">

        <div class="cuadrito">
            <img src="img/abeja.webp" alt="">
        </div>
        <div class="cuadrito2">
            <img src="img/abeja2.webp" alt="">
        </div>
    </div>
</body>





</html>
